<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – Budget Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="banner-wrapper">
        <header class="banner">
            <h1>Budget Planner</h1>
        </header>
    </div>
    <div class="auth-wrapper">
        <div class="auth-container">

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="auth-flash-messages">
                  {% for category, message in messages %}
                    <div class="auth-flash {{ category }}">{{ message }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <div class="auth-icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                    <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
            </div>
            <form method="post" action="/register" id="registerForm">
                <div class="auth-form-field">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Email, phone or username" required autocomplete="username">
                </div>

                <div class="auth-form-field">
                    <label for="password">Password
                        <span class="info-tooltip">
                            <span class="info-icon">&#x24D8;</span>
                            <span class="tooltip-box">
                                <strong>Password must have:</strong>
                                <ul>
                                    <li>At least 8 characters</li>
                                    <li>One uppercase letter</li>
                                    <li>One lowercase letter</li>
                                    <li>One number</li>
                                </ul>
                            </span>
                        </span>
                    </label>
                    <input type="text" id="password" name="password" placeholder="Minimum 8 characters" required autocomplete="new-password">
                </div>

                <div class="auth-form-field">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="text" id="confirmPassword" name="confirmPassword" placeholder="Re-enter your password" required autocomplete="new-password">
                    <div class="match-indicator" id="matchIndicator"></div>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>
            </form>
            <p class="auth-footer-link">Already have an account? <a href="/login">Sign in</a></p>
        </div>
    </div>

    <script>
        function checkMatch() {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            const el = document.getElementById('matchIndicator');
            if (!cpw) { el.textContent = ''; el.className = 'match-indicator'; return; }
            if (pw === cpw) {
                el.textContent = '✓ Passwords match';
                el.className = 'match-indicator match';
            } else {
                el.textContent = '✗ Passwords do not match';
                el.className = 'match-indicator mismatch';
            }
        }

        document.getElementById('password').addEventListener('input', function() {
            checkMatch();
        });
        document.getElementById('confirmPassword').addEventListener('input', checkMatch);

        document.getElementById('registerForm').addEventListener('submit', function(e) {
            const pw = document.getElementById('password').value;
            const cpw = document.getElementById('confirmPassword').value;
            if (pw.length < 8) { e.preventDefault(); return; }
            if (pw !== cpw) { e.preventDefault(); return; }
        });
    </script>
</body>
</html>
